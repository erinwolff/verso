services:
  verso:
    build: .
    image: verso
    container_name: verso
    # Map a host port of your choosing -> 8000 in the container.
    ports:
      - "8330:8000"
    volumes:
      # Your journal lives here. Back up by copying this folder.
      - ./data:/data
    environment:
      - VERSO_DATA_DIR=/data
      # Set a real password. A journal leaking is worse than a step count.
      - VERSO_PASSWORD=change-me
      # Your timezone, so "today" and the streak roll over at local midnight.
      - TZ=America/Los_Angeles
      # Enable when served over HTTPS (behind your reverse proxy):
      # - VERSO_COOKIE_SECURE=1
    restart: unless-stopped
